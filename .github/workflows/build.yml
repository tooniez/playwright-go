name: Go
on:
  push:
    branches: [ main, roll/* ]
  pull_request:
    branches: [ main, roll/* ]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Set up Go 1.x
      uses: actions/setup-go@v6
      with:
        go-version: oldstable
      id: go
    - name: golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: latest
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        browser: [chromium, firefox, webkit]
        go: ['stable', 'oldstable']
    runs-on: ${{ matrix.os }}
    name:  ${{ matrix.browser }} on ${{ matrix.os }}, go ${{ matrix.go }}
    permissions:
      # Needed for flakiness.io upload via GitHub OIDC (no access token required).
      id-token: write
      contents: read
    steps:
    - uses: actions/checkout@v7
      with:
        submodules: true
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ matrix.go }}
      id: go
    - name: Cache drivers
      uses: actions/cache@v6
      with:
        # In order:
        # * Driver for linux
        # * Driver for macOS
        # * Driver for windows
        path: |
          ~/.cache/ms-playwright-go
          ~/.cache/ms-playwright
          ~/Library/Caches/ms-playwright-go
          ~/Library/Caches/ms-playwright
          ~\AppData\Local\ms-playwright-go
          ~\AppData\Local\ms-playwright
        key: ${{ runner.os }}-go${{ matrix.go }}-${{ matrix.browser }}-${{ hashFiles('**/run.go') }}
    - run: |
        go install ./...
        go install github.com/mxschmitt/flakiness-go/cmd/flakiness-go@latest
        playwright install --with-deps ${{ matrix.browser }}
    - name: Test
      env:
        BROWSER: ${{ matrix.browser }}
        FLAKINESS_PROJECT: playwright-community/playwright-go
        FLAKINESS_NAME: ${{ matrix.browser }}
      if: matrix.os == 'ubuntu-latest'
      run: xvfb-run flakiness-go -timeout 15m -v -coverprofile=covprofile -coverpkg="github.com/playwright-community/playwright-go" --race ./...
    - name: Test
      env:
        BROWSER: ${{ matrix.browser }}
        FLAKINESS_PROJECT: playwright-community/playwright-go
        FLAKINESS_NAME: ${{ matrix.browser }}
      if: matrix.os != 'ubuntu-latest'
      run: flakiness-go -timeout 15m -v -coverprofile=covprofile -coverpkg="github.com/playwright-community/playwright-go" --race ./...
    - name: Send coverage
      uses: shogo82148/actions-goveralls@v1
      if: matrix.go == 'stable'
      with:
          path-to-profile: covprofile
          flag-name: ${{ matrix.os }}-${{ matrix.browser }}
          parallel: true
      continue-on-error: true
  finish:
    if: ${{ always() }}
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: shogo82148/actions-goveralls@v1
      with:
        parallel-finished: true
  test-examples:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Set up Go 1.x
      uses: actions/setup-go@v6
      with:
        go-version: oldstable
      id: go
    - run: |
        go install ./...
        playwright install --with-deps
    - name: Run examples
      run: |
        for dir in examples/*; do
          echo "::group::go run $dir/main.go"
          xvfb-run -a go run $dir/main.go
          echo "::endgroup::"
        done
